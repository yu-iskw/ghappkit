name: Test python

on:
  pull_request:
    paths:
      - .github/workflows/test.yml
      - dev/**
      - examples/**
      - packages/**
      - pyproject.toml
      - ruff.toml
      - uv.lock
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false
    defaults:
      run:
        shell: bash
    env:
      PYTHON_PACKAGE_NAME: ghappkit
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        env:
          PYTHON_BIN: ${{ steps.setup-python.outputs.python-path }}
        run: |
          bash dev/setup.sh --deps "development"
      - name: Vulture (dead code)
        run: |
          uv run vulture
      - name: Run tests
        run: |
          uv run bash dev/test_python.sh
      - name: Test build
        run: |
          uv run bash dev/build.sh
      # - name: Test installation
      #   run: |
      #     pip install -e .
      #     python -c 'import ${{ env.PYTHON_PACKAGE_NAME }}'
