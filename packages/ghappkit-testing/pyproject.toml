[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/ghappkit_testing"]

[project]
name = "ghappkit-testing"
version = "0.1.0"
description = "Testing and simulation helpers for ghappkit."
requires-python = ">=3.10.0"
dependencies = [
  "ghappkit",
  "ghappkit-client",
  "httpx>=0.27",
  "pytest>=8",
]

[tool.uv.sources]
ghappkit = { workspace = true }
ghappkit-client = { workspace = true }
